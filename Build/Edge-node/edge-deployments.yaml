########################################
# EDGE NODE 1
########################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-node1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-node1
  template:
    metadata:
      labels:
        app: edge-node1
    spec:
      containers:
      - name: edge
        image: amogh0709/fastapi-application:v5
        ports:
        - containerPort: 8000
        env:
        - name: REMOTE_SERVER_URL
          value: "http://172.16.23.128:8080/data"
---
apiVersion: v1
kind: Service
metadata:
  name: edge-service1
spec:
  type: NodePort
  selector:
    app: edge-node1
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30081


